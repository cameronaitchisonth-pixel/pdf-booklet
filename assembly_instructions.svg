<svg width="100%" viewBox="0 0 680 1200" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background: white;">
<style>
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
  .teal-text { fill: #085041; }
  .purple-fill { fill: #EEEDFE; stroke: #534AB7; }
  .purple-text { fill: #3C3489; }
  .coral-fill { fill: #FAECE7; stroke: #993C1D; }
  .coral-text { fill: #712B13; }
  .pink-fill { fill: #FBEAF0; stroke: #993556; }
  .pink-text { fill: #72243E; }
  .gray-fill { fill: #F1EFE8; stroke: #5F5E5A; }
  .gray-text { fill: #444441; }
  .cut-line { stroke: #A32D2D; stroke-width: 1; stroke-dasharray: 4 3; }
  .fold-line { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
  .arrow-line { stroke: #888780; stroke-width: 1; }
  .leader { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Step 1: Print -->
<text class="th" x="40" y="36">Step 1: print duplex (short edge flip)</text>
<text class="ts" x="40" y="56">You get 2 physical sheets, each printed on both sides</text>

<!-- Sheet 1 front -->
<text class="ts" x="80" y="86">Sheet 1 front</text>
<rect x="80" y="94" width="200" height="120" rx="4" fill="none" stroke="#2C2C2A" stroke-width="0.5"/>
<line x1="80" y1="154" x2="280" y2="154" class="cut-line"/>
<line x1="180" y1="94" x2="180" y2="214" class="fold-line"/>
<rect x="105" y="108" width="50" height="32" rx="3" class="teal-fill" stroke-width="0.5"/><text class="ts teal-text" x="130" y="128" text-anchor="middle" dominant-baseline="central">16</text>
<rect x="205" y="108" width="50" height="32" rx="3" class="teal-fill" stroke-width="0.5"/><text class="ts teal-text" x="230" y="128" text-anchor="middle" dominant-baseline="central">1</text>
<rect x="105" y="168" width="50" height="32" rx="3" class="purple-fill" stroke-width="0.5"/><text class="ts purple-text" x="130" y="188" text-anchor="middle" dominant-baseline="central">12</text>
<rect x="205" y="168" width="50" height="32" rx="3" class="purple-fill" stroke-width="0.5"/><text class="ts purple-text" x="230" y="188" text-anchor="middle" dominant-baseline="central">5</text>

<!-- Sheet 1 back -->
<text class="ts" x="380" y="86">Sheet 1 back</text>
<rect x="380" y="94" width="200" height="120" rx="4" fill="none" stroke="#2C2C2A" stroke-width="0.5"/>
<line x1="380" y1="154" x2="580" y2="154" class="cut-line"/>
<line x1="480" y1="94" x2="480" y2="214" class="fold-line"/>
<rect x="405" y="108" width="50" height="32" rx="3" class="teal-fill" stroke-width="0.5"/><text class="ts teal-text" x="430" y="128" text-anchor="middle" dominant-baseline="central">2</text>
<rect x="505" y="108" width="50" height="32" rx="3" class="teal-fill" stroke-width="0.5"/><text class="ts teal-text" x="530" y="128" text-anchor="middle" dominant-baseline="central">15</text>
<rect x="405" y="168" width="50" height="32" rx="3" class="purple-fill" stroke-width="0.5"/><text class="ts purple-text" x="430" y="188" text-anchor="middle" dominant-baseline="central">6</text>
<rect x="505" y="168" width="50" height="32" rx="3" class="purple-fill" stroke-width="0.5"/><text class="ts purple-text" x="530" y="188" text-anchor="middle" dominant-baseline="central">11</text>

<!-- Sheet 2 front -->
<text class="ts" x="80" y="244">Sheet 2 front</text>
<rect x="80" y="252" width="200" height="120" rx="4" fill="none" stroke="#2C2C2A" stroke-width="0.5"/>
<line x1="80" y1="312" x2="280" y2="312" class="cut-line"/>
<line x1="180" y1="252" x2="180" y2="372" class="fold-line"/>
<rect x="105" y="266" width="50" height="32" rx="3" class="coral-fill" stroke-width="0.5"/><text class="ts coral-text" x="130" y="286" text-anchor="middle" dominant-baseline="central">14</text>
<rect x="205" y="266" width="50" height="32" rx="3" class="coral-fill" stroke-width="0.5"/><text class="ts coral-text" x="230" y="286" text-anchor="middle" dominant-baseline="central">3</text>
<rect x="105" y="326" width="50" height="32" rx="3" class="pink-fill" stroke-width="0.5"/><text class="ts pink-text" x="130" y="346" text-anchor="middle" dominant-baseline="central">10</text>
<rect x="205" y="326" width="50" height="32" rx="3" class="pink-fill" stroke-width="0.5"/><text class="ts pink-text" x="230" y="346" text-anchor="middle" dominant-baseline="central">7</text>

<!-- Sheet 2 back -->
<text class="ts" x="380" y="244">Sheet 2 back</text>
<rect x="380" y="252" width="200" height="120" rx="4" fill="none" stroke="#2C2C2A" stroke-width="0.5"/>
<line x1="380" y1="312" x2="580" y2="312" class="cut-line"/>
<line x1="480" y1="252" x2="480" y2="372" class="fold-line"/>
<rect x="405" y="266" width="50" height="32" rx="3" class="coral-fill" stroke-width="0.5"/><text class="ts coral-text" x="430" y="286" text-anchor="middle" dominant-baseline="central">4</text>
<rect x="505" y="266" width="50" height="32" rx="3" class="coral-fill" stroke-width="0.5"/><text class="ts coral-text" x="530" y="286" text-anchor="middle" dominant-baseline="central">13</text>
<rect x="405" y="326" width="50" height="32" rx="3" class="pink-fill" stroke-width="0.5"/><text class="ts pink-text" x="430" y="346" text-anchor="middle" dominant-baseline="central">8</text>
<rect x="505" y="326" width="50" height="32" rx="3" class="pink-fill" stroke-width="0.5"/><text class="ts pink-text" x="530" y="346" text-anchor="middle" dominant-baseline="central">9</text>

<!-- Legend -->
<rect x="80" y="392" width="12" height="12" rx="2" class="teal-fill" stroke-width="0.5"/>
<text class="ts" x="98" y="403">Sheet 1 top</text>
<rect x="190" y="392" width="12" height="12" rx="2" class="purple-fill" stroke-width="0.5"/>
<text class="ts" x="208" y="403">Sheet 1 bottom</text>
<rect x="320" y="392" width="12" height="12" rx="2" class="coral-fill" stroke-width="0.5"/>
<text class="ts" x="338" y="403">Sheet 2 top</text>
<rect x="430" y="392" width="12" height="12" rx="2" class="pink-fill" stroke-width="0.5"/>
<text class="ts" x="448" y="403">Sheet 2 bottom</text>

<!-- Arrow -->
<line x1="340" y1="420" x2="340" y2="455" class="arrow-line" marker-end="url(#arrow)"/>

<!-- Step 2: Cut -->
<text class="th" x="40" y="480">Step 2: cut each sheet horizontally</text>
<text class="ts" x="40" y="500">You now have 4 half-sheets (each has a front and back)</text>

<rect x="50" y="520" width="130" height="44" rx="4" class="teal-fill" stroke-width="0.5"/>
<text class="ts teal-text" x="115" y="536" text-anchor="middle" dominant-baseline="central">16 | 1</text>
<text class="ts teal-text" x="115" y="554" text-anchor="middle" dominant-baseline="central" opacity="0.6">(back: 2 | 15)</text>

<rect x="195" y="520" width="130" height="44" rx="4" class="coral-fill" stroke-width="0.5"/>
<text class="ts coral-text" x="260" y="536" text-anchor="middle" dominant-baseline="central">14 | 3</text>
<text class="ts coral-text" x="260" y="554" text-anchor="middle" dominant-baseline="central" opacity="0.6">(back: 4 | 13)</text>

<rect x="340" y="520" width="130" height="44" rx="4" class="purple-fill" stroke-width="0.5"/>
<text class="ts purple-text" x="405" y="536" text-anchor="middle" dominant-baseline="central">12 | 5</text>
<text class="ts purple-text" x="405" y="554" text-anchor="middle" dominant-baseline="central" opacity="0.6">(back: 6 | 11)</text>

<rect x="485" y="520" width="130" height="44" rx="4" class="pink-fill" stroke-width="0.5"/>
<text class="ts pink-text" x="550" y="536" text-anchor="middle" dominant-baseline="central">10 | 7</text>
<text class="ts pink-text" x="550" y="554" text-anchor="middle" dominant-baseline="central" opacity="0.6">(back: 8 | 9)</text>

<!-- Arrow -->
<line x1="340" y1="580" x2="340" y2="615" class="arrow-line" marker-end="url(#arrow)"/>

<!-- Step 3: Fold each half-sheet -->
<text class="th" x="40" y="640">Step 3: fold each half-sheet in half</text>
<text class="ts" x="40" y="660">Each becomes a 4-page mini-signature</text>

<rect x="60" y="680" width="60" height="80" rx="3" class="teal-fill" stroke-width="0.5"/>
<text class="ts teal-text" x="90" y="706" text-anchor="middle" dominant-baseline="central">p1</text>
<text class="ts teal-text" x="90" y="724" text-anchor="middle" dominant-baseline="central" opacity="0.6">front</text>
<text class="ts" x="90" y="770" text-anchor="middle">A</text>

<rect x="180" y="680" width="60" height="80" rx="3" class="coral-fill" stroke-width="0.5"/>
<text class="ts coral-text" x="210" y="706" text-anchor="middle" dominant-baseline="central">p3</text>
<text class="ts coral-text" x="210" y="724" text-anchor="middle" dominant-baseline="central" opacity="0.6">front</text>
<text class="ts" x="210" y="770" text-anchor="middle">B</text>

<rect x="300" y="680" width="60" height="80" rx="3" class="purple-fill" stroke-width="0.5"/>
<text class="ts purple-text" x="330" y="706" text-anchor="middle" dominant-baseline="central">p5</text>
<text class="ts purple-text" x="330" y="724" text-anchor="middle" dominant-baseline="central" opacity="0.6">front</text>
<text class="ts" x="330" y="770" text-anchor="middle">C</text>

<rect x="420" y="680" width="60" height="80" rx="3" class="pink-fill" stroke-width="0.5"/>
<text class="ts pink-text" x="450" y="706" text-anchor="middle" dominant-baseline="central">p7</text>
<text class="ts pink-text" x="450" y="724" text-anchor="middle" dominant-baseline="central" opacity="0.6">front</text>
<text class="ts" x="450" y="770" text-anchor="middle">D</text>

<text class="ts" x="530" y="710">Each signature contains</text>
<text class="ts" x="530" y="728">4 pages when opened</text>

<!-- Arrow -->
<line x1="340" y1="790" x2="340" y2="825" class="arrow-line" marker-end="url(#arrow)"/>

<!-- Step 4: Nest -->
<text class="th" x="40" y="850">Step 4: nest signatures (D inside C inside B inside A)</text>
<text class="ts" x="40" y="870">Innermost = D (pages 7-10), outermost = A (pages 1-2, 15-16)</text>

<!-- Nested view -->
<g transform="translate(120,890)">
<!-- Outermost A -->
<path d="M0,0 L0,80 L4,80 L4,0 Z" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5" opacity="0.8"/>
<path d="M196,0 L196,80 L200,80 L200,0 Z" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5" opacity="0.8"/>
<rect x="0" y="0" width="200" height="80" rx="3" fill="none" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="ts" x="100" y="-8" text-anchor="middle" fill="#085041">A: pages 16, 1, 2, 15</text>

<!-- B -->
<path d="M16,8 L16,72 L20,72 L20,8 Z" fill="#F0997B" stroke="#993C1D" stroke-width="0.5" opacity="0.8"/>
<path d="M180,8 L180,72 L184,72 L184,8 Z" fill="#F0997B" stroke="#993C1D" stroke-width="0.5" opacity="0.8"/>
<rect x="16" y="8" width="168" height="64" rx="3" fill="none" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="ts" x="100" y="24" text-anchor="middle" fill="#712B13">B: pages 14, 3, 4, 13</text>

<!-- C -->
<path d="M32,18 L32,62 L36,62 L36,18 Z" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5" opacity="0.8"/>
<path d="M164,18 L164,62 L168,62 L168,18 Z" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5" opacity="0.8"/>
<rect x="32" y="18" width="136" height="44" rx="3" fill="none" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="ts" x="100" y="42" text-anchor="middle" fill="#3C3489">C: pages 12, 5, 6, 11</text>

<!-- Innermost D -->
<path d="M48,28 L48,52 L52,52 L52,28 Z" fill="#ED93B1" stroke="#993556" stroke-width="0.5" opacity="0.8"/>
<path d="M148,28 L148,52 L152,52 L152,28 Z" fill="#ED93B1" stroke="#993556" stroke-width="0.5" opacity="0.8"/>
<rect x="48" y="28" width="104" height="24" rx="3" fill="none" stroke="#993556" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="ts" x="100" y="56" text-anchor="middle" fill="#72243E">D: pages 10, 7, 8, 9</text>
</g>

<!-- Staple indicators -->
<circle cx="120" cy="930" r="3" fill="#888780"/>
<text class="ts" x="108" y="932" text-anchor="end">staple</text>

<!-- Arrow -->
<line x1="340" y1="990" x2="340" y2="1020" class="arrow-line" marker-end="url(#arrow)"/>

<!-- Step 5: Final -->
<text class="th" x="40" y="1048">Step 5: staple spine, done</text>
<text class="ts" x="40" y="1068">Pages read 1, 2, 3 ... 16 like a normal book</text>

<rect x="220" y="1086" width="110" height="80" rx="4" class="gray-fill" stroke-width="1"/>
<text class="th" x="275" y="1118" text-anchor="middle" dominant-baseline="central">Page 1</text>
<text class="ts" x="275" y="1140" text-anchor="middle" dominant-baseline="central">front cover</text>

<circle cx="220" cy="1108" r="2.5" fill="#888780"/>
<circle cx="220" cy="1132" r="2.5" fill="#888780"/>
<text class="ts" x="208" y="1122" text-anchor="end">spine</text>

<rect x="350" y="1086" width="110" height="80" rx="4" class="gray-fill" stroke-width="1"/>
<text class="th" x="405" y="1118" text-anchor="middle" dominant-baseline="central">Page 16</text>
<text class="ts" x="405" y="1140" text-anchor="middle" dominant-baseline="central">back cover</text>

</svg>